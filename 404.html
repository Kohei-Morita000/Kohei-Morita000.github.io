<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ページが見つかりません</title><meta name="robots" content="noindex,follow"><meta name="theme-color" content="#090b10"><link rel="stylesheet" href="/Kohei-Morita000.github.io/yorugatari/assets/styles.css">
<style>.error-shell{min-height:100dvh;display:grid;place-items:center;padding:32px}.error-box{width:min(100%,680px);text-align:center;background:rgba(12,15,22,.82);border:1px solid var(--line);border-radius:var(--radius);padding:clamp(28px,7vw,64px)}.error-code{font-family:serif;font-size:clamp(4rem,18vw,8rem);line-height:1;color:var(--accent);margin:0}.error-box h1{font-family:serif}.error-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:28px}</style></head>
<body><main class="error-shell"><section class="error-box"><p class="error-code">404</p><h1 id="errorTitle">ページが見つかりません</h1><p id="errorText">URLが変更されたか、ページが削除された可能性があります。</p><div class="error-actions"><a class="btn btn-primary" id="primaryLink" href="/">トップへ戻る</a><button class="btn" type="button" id="backButton">前のページへ戻る</button></div></section></main>
<script>document.querySelector('#backButton').addEventListener('click',()=>history.length>1?history.back():location.assign('/'));if(location.pathname.startsWith('/Kohei-Morita000.github.io/yorugatari/')){document.title='ページが見つかりません｜夜語り';document.querySelector('#errorTitle').textContent='その話は見つかりません';document.querySelector('#errorText').textContent='URLが違うか、まだ公開されていない怖い話です。';const a=document.querySelector('#primaryLink');a.href='/Kohei-Morita000.github.io/yorugatari/';a.textContent='夜語りへ戻る'}</script></body></html>
