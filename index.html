<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ノンアルゲームテーブル</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <svg class="sprite" aria-hidden="true">
      <symbol id="icon-users" viewBox="0 0 24 24">
        <path d="M16 20v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M22 20v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </symbol>
      <symbol id="icon-timer" viewBox="0 0 24 24">
        <path d="M10 2h4"></path>
        <path d="M12 14l3-3"></path>
        <circle cx="12" cy="14" r="8"></circle>
      </symbol>
      <symbol id="icon-shuffle" viewBox="0 0 24 24">
        <path d="M16 3h5v5"></path>
        <path d="M4 20L21 3"></path>
        <path d="M21 16v5h-5"></path>
        <path d="M15 15l6 6"></path>
        <path d="M4 4l5 5"></path>
      </symbol>
      <symbol id="icon-reset" viewBox="0 0 24 24">
        <path d="M3 12a9 9 0 1 0 3-6.7"></path>
        <path d="M3 3v6h6"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="M5 3l14 9-14 9z"></path>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="M20 6 9 17l-5-5"></path>
      </symbol>
      <symbol id="icon-x" viewBox="0 0 24 24">
        <path d="M18 6 6 18"></path>
        <path d="M6 6l12 12"></path>
      </symbol>
      <symbol id="icon-eye" viewBox="0 0 24 24">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </symbol>
      <symbol id="icon-trophy" viewBox="0 0 24 24">
        <path d="M8 21h8"></path>
        <path d="M12 17v4"></path>
        <path d="M7 4h10v5a5 5 0 0 1-10 0V4z"></path>
        <path d="M5 6H3a3 3 0 0 0 3 3h1"></path>
        <path d="M19 6h2a3 3 0 0 1-3 3h-1"></path>
      </symbol>
      <symbol id="icon-cup" viewBox="0 0 24 24">
        <path d="M7 3h10l-1 18H8L7 3z"></path>
        <path d="M7.3 8h9.4"></path>
        <path d="M9 12h6"></path>
      </symbol>
      <symbol id="icon-pen" viewBox="0 0 24 24">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
      </symbol>
      <symbol id="icon-brain" viewBox="0 0 24 24">
        <path d="M9 3a4 4 0 0 0-4 4v1a4 4 0 0 0 0 8v1a4 4 0 0 0 7 2"></path>
        <path d="M15 3a4 4 0 0 1 4 4v1a4 4 0 0 1 0 8v1a4 4 0 0 1-7 2"></path>
        <path d="M12 4v16"></path>
      </symbol>
      <symbol id="icon-target" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"></circle>
        <circle cx="12" cy="12" r="5"></circle>
        <circle cx="12" cy="12" r="1.5"></circle>
      </symbol>
      <symbol id="icon-vote" viewBox="0 0 24 24">
        <path d="M4 4h16v16H4z"></path>
        <path d="m8 12 3 3 5-6"></path>
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Non-Al Game Table</p>
          <h1>ノンアルゲームテーブル</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" type="button" data-action="random-game" title="ランダムに選ぶ" aria-label="ランダムに選ぶ">
            <svg><use href="#icon-shuffle"></use></svg>
          </button>
          <button class="icon-button" type="button" data-action="reset-all" title="リセット" aria-label="リセット">
            <svg><use href="#icon-reset"></use></svg>
          </button>
        </div>
      </header>

      <aside class="players-panel" aria-label="参加者">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Players</p>
            <h2>参加者</h2>
          </div>
          <button class="icon-button small" type="button" data-action="add-player" title="参加者を追加" aria-label="参加者を追加">
            <svg><use href="#icon-plus"></use></svg>
          </button>
        </div>
        <div id="playersList" class="players-list"></div>
        <div id="scoreboard" class="scoreboard"></div>
      </aside>

      <main class="stage" aria-live="polite">
        <div id="gameStage"></div>
      </main>

      <aside class="library-panel" aria-label="ゲーム一覧">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Games</p>
            <h2>10ゲーム</h2>
          </div>
        </div>
        <div id="gameLibrary" class="game-library"></div>
        <div id="history" class="history"></div>
      </aside>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
