name: Patch MKB-006 listing

on:
  push:
    paths:
      - .github/workflows/patch-mkb006.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch index and sitemap
        shell: python
        run: |
          from pathlib import Path

          index_path = Path("index.html")
          sitemap_path = Path("sitemap.xml")
          index = index_path.read_text(encoding="utf-8")
          sitemap = sitemap_path.read_text(encoding="utf-8")

          story_path = "/kyokai-yawa/stories/mkb-006-seiso-zumi-no-heya.html"
          story_url = "https://allsunday1122.github.io" + story_path

          if story_path not in index:
              card = '''      <a class="work-card" href="/kyokai-yawa/stories/mkb-006-seiso-zumi-no-heya.html"><div><span class="id">MKB-006 · 真壁夜話</span><h3>清掃済みの部屋</h3><p>清掃端末の備品数が現実を上書きし、閉鎖されたホテル507号室を同じ番号の自宅へ移していく。</p></div><div class="work-meta"><span class="tag">短編</span><span class="tag">約6分</span><span class="tag">恐怖 3</span></div></a>\n'''
              marker = '      <a class="work-card" href="/kyokai-yawa/stories/mkb-008-mujin-reji-no-miseisansha.html">'
              if marker not in index:
                  raise SystemExit("MKB-008 card marker not found")
              index = index.replace(marker, card + marker, 1)

              series_old = '<article class="series-card" id="series-makabe"><div class="series-card-head"><div class="series-title-row"><h3>真壁夜話</h3><span class="series-count">6話公開</span>'
              series_new = '<article class="series-card" id="series-makabe"><div class="series-card-head"><div class="series-title-row"><h3>真壁夜話</h3><span class="series-count">7話公開</span>'
              if series_old not in index:
                  raise SystemExit("Makabe series count marker not found")
              index = index.replace(series_old, series_new, 1)

              list_marker = '<li><a class="story-link" href="/kyokai-yawa/stories/mkb-008-mujin-reji-no-miseisansha.html">'
              list_item = '<li><a class="story-link" href="/kyokai-yawa/stories/mkb-006-seiso-zumi-no-heya.html"><span class="story-id">MKB-006</span><span class="story-title">清掃済みの部屋</span><span class="story-arrow">›</span></a></li>'
              if list_marker not in index:
                  raise SystemExit("MKB-008 list marker not found")
              index = index.replace(list_marker, list_item + list_marker, 1)

              index = index.replace('勤怠、宅配、画面、顔認証、忘れ物、無人レジの記録。', '勤怠、宅配、画面、顔認証、忘れ物、清掃、無人レジの記録。', 1)
              index_path.write_text(index, encoding="utf-8")

          if story_url not in sitemap:
              marker = '  <url><loc>https://allsunday1122.github.io/kyokai-yawa/stories/mkb-008-mujin-reji-no-miseisansha.html</loc>'
              item = '  <url><loc>' + story_url + '</loc><lastmod>2026-07-18</lastmod></url>\n'
              if marker not in sitemap:
                  raise SystemExit("MKB-008 sitemap marker not found")
              sitemap = sitemap.replace(marker, item + marker, 1)
              sitemap_path.write_text(sitemap, encoding="utf-8")

          Path(".github/workflows/patch-mkb006.yml").unlink(missing_ok=True)
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml .github/workflows/patch-mkb006.yml
          git commit -m "List MKB-006 on archive" || exit 0
          git push
