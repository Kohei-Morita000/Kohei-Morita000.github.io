name: Series Live Audit

on:
  push:
    paths:
      - 'index.html'
      - 'series/**'
      - 'data/series-pages.css'
      - 'data/series-links.js'
      - 'sitemap.xml'
      - 'scripts/audit-live-series-pages.mjs'
      - '.github/workflows/series-live-audit.yml'
  workflow_dispatch:

concurrency:
  group: series-live-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-production:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for deployment and audit series pages
        run: |
          success=0
          for attempt in $(seq 1 30); do
            echo "Series production audit ${attempt}/30"
            if node scripts/audit-live-series-pages.mjs; then
              success=1
              break
            fi
            sleep 10
          done
          if [ "$success" -ne 1 ]; then
            exit 1
          fi

      - name: Commit production report
        if: always()
        run: |
          if [ ! -f reports/live-series-pages-audit.md ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live-series-pages-audit.md
          if git diff --cached --quiet; then
            echo "Series production report is unchanged."
          else
            git commit -m "chore: record series production audit"
            git pull --rebase origin main
            git push
          fi
