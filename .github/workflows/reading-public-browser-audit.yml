name: Public Reading Browser Audit

on:
  schedule:
    - cron: '30 21 * * *' # 06:30 JST
  workflow_run:
    workflows:
      - 'Reading Backup Browser Audit'
      - 'Reading Log Audit'
      - 'Content Audit'
    types: [completed]
  push:
    paths:
      - 'package.json'
      - 'playwright.config.mjs'
      - 'index.html'
      - 'reading-log.html'
      - 'series/*.html'
      - 'data/archive-tools.js'
      - 'data/series-archive-tools.js'
      - 'data/home-personalization.js'
      - 'data/accessibility-contrast.css'
      - 'data/reading-log.css'
      - 'data/reading-log.js'
      - 'data/series-work-cards.css'
      - 'data/works.js'
      - 'tests/reading-backup.spec.mjs'
      - 'tests/reading-state.spec.mjs'
      - 'tests/reading-discovery.spec.mjs'
      - 'tests/reading-log-management.spec.mjs'
      - 'tests/site-health.spec.mjs'
      - 'scripts/normalize-reading-log.mjs'
      - 'scripts/normalize-series-pages.mjs'
      - 'scripts/normalize-accessibility-contrast.mjs'
      - 'scripts/reading-browser-reporter.mjs'
      - 'scripts/site-health-reporter.mjs'
      - 'scripts/audit-reading-public-browser-workflow.mjs'
      - 'scripts/audit-site-health-workflow.mjs'
      - 'scripts/audit-accessibility-contrast-assets.mjs'
      - '.github/workflows/reading-public-browser-audit.yml'
  workflow_dispatch:

concurrency:
  group: public-reading-browser-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  public-browser-audit:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: https://allsunday1122.github.io/kyokai-yawa/
      READING_BROWSER_REPORT: reading-public-browser-audit.md
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit public browser schedule and safeguards
        run: node scripts/audit-reading-public-browser-workflow.mjs
      - name: Audit accessibility and runtime safeguards
        run: node scripts/audit-site-health-workflow.mjs
      - name: Audit shared contrast stylesheet references
        run: node scripts/audit-accessibility-contrast-assets.mjs
      - name: Wait for GitHub Pages deployment
        if: github.event_name != 'schedule'
        run: sleep 60
      - name: Install browser test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit
      - name: Operate reading features on the published site
        id: tests
        continue-on-error: true
        run: npx playwright test tests/reading-backup.spec.mjs tests/reading-state.spec.mjs tests/reading-discovery.spec.mjs tests/reading-log-management.spec.mjs --retries=2
      - name: Audit all public pages for accessibility runtime errors and failed requests
        id: health
        continue-on-error: true
        env:
          SITE_HEALTH_REPORT: site-public-health-audit.md
        run: npx playwright test tests/site-health.spec.mjs --retries=1
      - name: Upload browser reports traces screenshots and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-reading-and-site-health-audit
          path: |
            reports/reading-public-browser-workflow-audit.md
            reports/reading-public-browser-audit.md
            reports/site-health-workflow-audit.md
            reports/site-public-health-audit.md
            reports/accessibility-contrast-assets-audit.md
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 14
      - name: Commit public browser audit reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/reading-public-browser-workflow-audit.md reports/reading-public-browser-audit.md reports/site-health-workflow-audit.md reports/accessibility-contrast-assets-audit.md
          if [ -f reports/site-public-health-audit.md ]; then git add reports/site-public-health-audit.md; fi
          if git diff --cached --quiet; then
            echo "Public browser audit reports are unchanged."
          else
            git commit -m "chore: record public reading and site health audit"
            git pull --rebase origin main
            git push
          fi
      - name: Fail when public browser tests fail
        if: steps.tests.outcome == 'failure' || steps.health.outcome == 'failure'
        run: exit 1
