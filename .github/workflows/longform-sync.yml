name: Longform story sync

on:
  pull_request:
    paths:
      - 'yorugatari/editorial/longform/*-publish.json'

permissions:
  contents: write

jobs:
  sync-longform:
    if: github.head_ref == 'agent/yorugatari-longform'
    runs-on: ubuntu-latest
    steps:
      - name: Check out content branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Publish longform drafts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import html
          import json
          import re

          root = Path('yorugatari')
          config_dir = root / 'editorial' / 'longform'
          stories_path = root / 'assets' / 'stories.js'
          story_js_path = root / 'assets' / 'story.js'
          configs = sorted(config_dir.glob('*-publish.json'))

          def read_story_data():
              stories_text = stories_path.read_text(encoding='utf-8')
              prefix = 'window.STORIES = '
              if not stories_text.startswith(prefix) or not stories_text.rstrip().endswith(';'):
                  raise SystemExit('stories.js format is unexpected')
              return prefix, json.loads(stories_text[len(prefix):].rstrip()[:-1])

          for config_path in configs:
              config = json.loads(config_path.read_text(encoding='utf-8'))
              slug = config['slug']
              minutes = int(config['minutes'])
              length = config.get('length', '中編')
              summary = config['summary']
              description = config.get('description', summary)
              explanation = config.get('explanation', '')
              draft_path = config_dir / config['draft']
              story_path = root / 'stories' / f'{slug}.html'

              lines = draft_path.read_text(encoding='utf-8').splitlines()
              paragraphs = []
              for line in lines:
                  text = line.strip()
                  if not text or text.startswith('# '):
                      continue
                  paragraphs.append(f'<p>{html.escape(text, quote=False)}</p>')

              article = ''.join(paragraphs)
              if explanation:
                  article += (
                      '<button class="btn" id="explainBtn" type="button" aria-controls="explanation" aria-expanded="false">解説を見る</button>'
                      '<div class="explanation" id="explanation"><strong>解説</strong>'
                      f'<p>{html.escape(explanation, quote=False)}</p></div>'
                  )
              article += '<p class="notice">この作品はフィクションです。AIを制作補助に使用し、編集工程を経て掲載しています。</p>'

              page = story_path.read_text(encoding='utf-8')
              old_description_match = re.search(r'<meta name="description" content="([^"]*)">', page)
              if not old_description_match:
                  raise SystemExit(f'meta description not found: {story_path}')
              old_description = old_description_match.group(1)
              page = page.replace(old_description, description)
              page, time_count = re.subn(
                  r'("timeRequired"\s*:\s*")PT\d+M(")',
                  rf'\g<1>PT{minutes}M\g<2>',
                  page,
                  count=1,
              )
              if time_count != 1:
                  raise SystemExit(f'structured reading time not found: {story_path}')
              page = re.sub(
                  r'(<div class="meta"><span class="badge">[^<]+</span>)<span>[^<]+</span><span>約\d+分</span>',
                  rf'\1<span>{length}</span><span>約{minutes}分</span>',
                  page,
                  count=1,
              )
              page = re.sub(
                  r'(<p class="section-note">).*?(</p>)',
                  lambda match: match.group(1) + html.escape(summary, quote=False) + match.group(2),
                  page,
                  count=1,
                  flags=re.S,
              )
              page, replacements = re.subn(
                  r'(<article class="story-body">).*?(</article>)',
                  lambda match: match.group(1) + article + match.group(2),
                  page,
                  count=1,
                  flags=re.S,
              )
              if replacements != 1:
                  raise SystemExit(f'article replacement failed: {story_path}')
              story_path.write_text(page, encoding='utf-8')

              prefix, data = read_story_data()
              target = next((story for story in data if story.get('slug') == slug), None)
              if target is None:
                  raise SystemExit(f'story data not found: {slug}')
              target['length'] = length
              target['minutes'] = minutes
              target['summary'] = summary
              stories_path.write_text(prefix + json.dumps(data, ensure_ascii=False, indent=2) + ';\n', encoding='utf-8')

              story_js = story_js_path.read_text(encoding='utf-8')
              story_js, count = re.subn(
                  rf"('{re.escape(slug)}':\s*)\d+",
                  rf'\g<1>{minutes}',
                  story_js,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f'reading time not found: {slug}')
              story_js_path.write_text(story_js, encoding='utf-8')

              config_path.unlink()

          prefix, data = read_story_data()
          minutes_by_slug = {story['slug']: int(story['minutes']) for story in data}
          related_pattern = re.compile(
              r'(<a class="rank-item" href="([^"]+)\.html"[^>]*>.*?<small>[^<]*・)約\d+分(</small>)',
              re.S,
          )

          for story_path in sorted((root / 'stories').glob('*.html')):
              page = story_path.read_text(encoding='utf-8')

              def replace_related(match):
                  related_slug = Path(match.group(2)).name
                  related_minutes = minutes_by_slug.get(related_slug)
                  if related_minutes is None:
                      raise SystemExit(f'related story not found: {story_path}: {related_slug}')
                  return f'{match.group(1)}約{related_minutes}分{match.group(3)}'

              page, related_count = related_pattern.subn(replace_related, page)
              if related_count != 2:
                  raise SystemExit(f'expected two related reading times in {story_path}, found {related_count}')
              story_path.write_text(page, encoding='utf-8')

          if not configs:
              print('No publish configurations found; related reading times were still normalized.')
          PY

      - name: Validate generated files
        shell: bash
        run: |
          node --check yorugatari/assets/stories.js
          node --check yorugatari/assets/story.js
          python - <<'PY'
          from collections import Counter
          from pathlib import Path
          import json
          import re

          root = Path('yorugatari')
          stories = sorted((root / 'stories').glob('*.html'))
          if len(stories) != 12:
              raise SystemExit(f'expected 12 story pages, found {len(stories)}')

          stories_text = (root / 'assets' / 'stories.js').read_text(encoding='utf-8')
          prefix = 'window.STORIES = '
          data = json.loads(stories_text[len(prefix):].rstrip()[:-1])
          minutes_by_slug = {story['slug']: int(story['minutes']) for story in data}
          related_pattern = re.compile(
              r'<a class="rank-item" href="([^"]+)\.html"[^>]*>.*?<small>[^<]*・約(\d+)分</small>',
              re.S,
          )

          for path in stories:
              text = path.read_text(encoding='utf-8')
              required = [
                  '<html lang="ja">',
                  'name="viewport"',
                  '<a class="skip-link" href="#story-content">本文へ移動</a>',
                  '<div class="progress" aria-hidden="true"></div>',
                  '<nav class="nav" aria-label="主要メニュー">',
                  '<main id="story-content" tabindex="-1">',
                  'id="favoriteBtn" type="button" aria-pressed="false"',
                  'id="shareBtn" type="button"',
                  'id="explainBtn" type="button" aria-controls="explanation" aria-expanded="false"',
                  'class="footer-links" aria-label="運営情報"',
                  '"timeRequired": "PT5M"',
                  '<span>中編</span><span>約5分</span>',
              ]
              for needle in required:
                  if needle not in text:
                      raise SystemExit(f'missing marker in {path}: {needle}')
              if len(re.findall(r'<h1(?:\s|>)', text)) != 1:
                  raise SystemExit(f'expected one h1 in {path}')
              if '<h3>作品情報</h3>' in text or '<h3>次に読む</h3>' in text:
                  raise SystemExit(f'heading hierarchy not updated in {path}')
              if re.search(r'<button(?![^>]*\stype=)[^>]*>', text):
                  raise SystemExit(f'button without type in {path}')
              if re.search(r'<span class="rank-num"(?![^>]*aria-hidden)', text):
                  raise SystemExit(f'decorative marker exposed in {path}')

              ids = re.findall(r'\sid="([^"]+)"', text)
              duplicates = [item for item, count in Counter(ids).items() if count > 1]
              if duplicates:
                  raise SystemExit(f'duplicate ids in {path}: {duplicates}')

              links = re.findall(r'<a\b[^>]*\bhref="([^"]*)"', text)
              if not links or any(not href for href in links):
                  raise SystemExit(f'empty or missing links in {path}')
              for href in links:
                  if href.startswith(('http://', 'https://', 'mailto:', 'tel:')):
                      continue
                  target_part, _, fragment = href.partition('#')
                  target = path if not target_part else path.parent / target_part
                  target = target.resolve()
                  if not target.exists():
                      raise SystemExit(f'broken local link in {path}: {href}')
                  if fragment:
                      target_text = target.read_text(encoding='utf-8')
                      if f'id="{fragment}"' not in target_text:
                          raise SystemExit(f'missing fragment target in {path}: {href}')

              related = related_pattern.findall(text)
              if len(related) != 2:
                  raise SystemExit(f'expected two related links in {path}')
              for related_slug, actual_minutes in related:
                  related_slug = Path(related_slug).name
                  expected_minutes = minutes_by_slug.get(related_slug)
                  if expected_minutes is None or int(actual_minutes) != expected_minutes:
                      raise SystemExit(
                          f'related reading time mismatch in {path}: '
                          f'{related_slug} expected {expected_minutes}, got {actual_minutes}'
                      )

          css = (root / 'assets' / 'styles.css').read_text(encoding='utf-8')
          for needle in ('.skip-link', ':focus-visible', '@media(max-width:900px)', '@media(max-width:600px)', '@media(prefers-reduced-motion:reduce)'):
              if needle not in css:
                  raise SystemExit(f'missing responsive/accessibility CSS: {needle}')
          print('Final consistency, accessibility and internal-link checks passed for 12 story pages.')
          PY

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add yorugatari
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "Publish longform story content"
          git push origin HEAD:${{ github.head_ref }}
