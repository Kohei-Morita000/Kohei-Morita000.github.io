name: Public Site Health Audit (Manual)

on:
  workflow_dispatch:

concurrency:
  group: public-site-health-manual
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  site-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BASE_URL: https://allsunday1122.github.io/kyokai-yawa/
      SITE_HEALTH_REPORT: site-public-health-manual-audit.md
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit shared contrast stylesheet references
        run: node scripts/audit-accessibility-contrast-assets.mjs
      - name: Install browser test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit
      - name: Remove the previous manual health report
        run: rm -f reports/site-public-health-manual-audit.md
      - name: Audit the published site health manually
        id: health
        continue-on-error: true
        run: npx playwright test tests/site-health.spec.mjs --retries=1
      - name: Verify a fresh manual report was generated
        id: report
        continue-on-error: true
        run: test -s reports/site-public-health-manual-audit.md
      - name: Upload manual health report traces screenshots and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-site-health-manual-audit
          path: |
            reports/accessibility-contrast-assets-audit.md
            reports/site-public-health-manual-audit.md
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 14
      - name: Commit the fresh manual health report
        if: always() && steps.report.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/accessibility-contrast-assets-audit.md reports/site-public-health-manual-audit.md
          if git diff --cached --quiet; then
            echo "Manual public site health report is unchanged."
          else
            git commit -m "chore: record manual public site health audit"
            git pull --rebase origin main
            git push
          fi
      - name: Fail when manual health tests or report generation fail
        if: steps.health.outcome == 'failure' || steps.report.outcome == 'failure'
        run: exit 1
