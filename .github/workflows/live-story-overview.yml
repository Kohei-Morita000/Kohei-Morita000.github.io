name: Live Story Overview Audit

on:
  workflow_run:
    workflows: ['Story Overview']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: live-story-overview-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-live:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit production story overview panels
        run: node scripts/audit-live-story-overviews.mjs

      - name: Commit production audit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live-story-overviews-audit.md
          if git diff --cached --quiet; then
            echo "Production story overview audit is unchanged."
          else
            git commit -m "chore: record story overview production audit"
            git pull --rebase origin main
            git push
          fi
