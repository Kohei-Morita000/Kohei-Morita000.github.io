name: Live Saved Stories Audit

on:
  workflow_run:
    workflows: ['Saved Stories Audit']
    types: [completed]
  push:
    paths:
      - 'data/saved-stories.css'
      - 'data/saved-stories.js'
      - 'data/archive-tools.js'
      - 'data/series-archive-tools.js'
      - 'data/home-personalization.js'
      - 'scripts/audit-live-saved-stories.mjs'
      - '.github/workflows/saved-stories-live-audit.yml'
  workflow_dispatch:

concurrency:
  group: live-saved-stories-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-live:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Wait for GitHub Pages deployment
        run: sleep 20
      - name: Audit production save for later management
        run: node scripts/audit-live-saved-stories.mjs
      - name: Commit production audit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live-saved-stories-audit.md
          if git diff --cached --quiet; then
            echo "Production saved stories audit is unchanged."
          else
            git commit -m "chore: record save for later production audit"
            git pull --rebase origin main
            git push
          fi
