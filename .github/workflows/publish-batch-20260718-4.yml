name: Publish approved stories batch 4

on:
  push:
    branches: [main]
    paths:
      - publish-batch-20260718-4.trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate publisher
        run: python -m py_compile publish_batch_20260718_4.py
      - name: Publish stories and update archive
        run: python publish_batch_20260718_4.py
