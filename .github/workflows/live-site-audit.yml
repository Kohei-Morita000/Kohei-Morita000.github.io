name: Live Site Audit

on:
  push:
    paths:
      - 'index.html'
      - '404.html'
      - 'offline.html'
      - 'service-worker.js'
      - 'manifest.webmanifest'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'feed.xml'
      - 'stories/**'
      - 'data/**'
      - 'assets/**'
      - 'scripts/audit-live-site.mjs'
      - 'scripts/audit-live-offline.mjs'
      - '.github/workflows/live-site-audit.yml'
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

concurrency:
  group: live-site-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for GitHub Pages and audit production
        run: |
          success=0
          for attempt in $(seq 1 30); do
            echo "Production audit attempt ${attempt}/30"
            if node scripts/audit-live-site.mjs && node scripts/audit-live-offline.mjs; then
              success=1
              break
            fi
            sleep 10
          done
          if [ "$success" -ne 1 ]; then
            echo "Production did not pass the audit within the deployment window."
            exit 1
          fi

      - name: Upload production audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-audit-reports
          path: reports/live-*.md
          if-no-files-found: error

      - name: Commit production audit reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/live-site-audit.md reports/live-offline-audit.md
          if git diff --cached --quiet; then
            echo "Production audit reports are unchanged."
          else
            git commit -m "chore: record production live site audit"
            git pull --rebase origin main
            git push
          fi
