name: Content Audit

on:
  push:
    paths:
      - '.nojekyll'
      - 'index.html'
      - '404.html'
      - 'offline.html'
      - 'service-worker.js'
      - 'robots.txt'
      - 'feed.xml'
      - 'manifest.webmanifest'
      - 'assets/social-card.svg'
      - 'assets/social-card.png'
      - 'assets/app-icon.svg'
      - 'assets/app-icon-192.png'
      - 'assets/app-icon-512.png'
      - 'assets/apple-touch-icon.png'
      - 'stories/**'
      - 'series/**'
      - 'data/works.js'
      - 'data/story-nav.js'
      - 'data/archive-tools.js'
      - 'data/sw-register.js'
      - 'data/reader-tools.css'
      - 'data/reader-tools.js'
      - 'data/series-pages.css'
      - 'data/series-links.js'
      - 'data/related-stories.css'
      - 'data/story-overview.css'
      - 'data/work-cards.css'
      - 'data/story-taxonomy.json'
      - 'data/story-style-*.css'
      - 'sitemap.xml'
      - 'scripts/audit-stories.mjs'
      - 'scripts/audit-length-categories.mjs'
      - 'scripts/audit-story-navigation.mjs'
      - 'scripts/audit-fear-levels.mjs'
      - 'scripts/audit-html-basics.mjs'
      - 'scripts/audit-public-assets.mjs'
      - 'scripts/audit-discovery.mjs'
      - 'scripts/audit-site-icons.mjs'
      - 'scripts/audit-offline.mjs'
      - 'scripts/audit-reader-experience.mjs'
      - 'scripts/audit-series-pages.mjs'
      - 'scripts/audit-related-stories.mjs'
      - 'scripts/audit-story-overviews.mjs'
      - 'scripts/audit-work-cards.mjs'
      - 'scripts/normalize-reading-times.mjs'
      - 'scripts/normalize-story-navigation.mjs'
      - 'scripts/normalize-fear-levels.mjs'
      - 'scripts/normalize-html-basics.mjs'
      - 'scripts/normalize-public-assets.mjs'
      - 'scripts/normalize-shared-story-css.mjs'
      - 'scripts/normalize-discovery.mjs'
      - 'scripts/normalize-site-icons.mjs'
      - 'scripts/normalize-offline.mjs'
      - 'scripts/normalize-reader-tools.mjs'
      - 'scripts/normalize-series-pages.mjs'
      - 'scripts/normalize-related-stories.mjs'
      - 'scripts/normalize-story-overviews.mjs'
      - '.github/workflows/content-audit.yml'
  workflow_dispatch:

concurrency:
  group: content-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SVG renderer and Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin fonts-noto-cjk

      - name: Render social sharing card
        run: rsvg-convert -w 1200 -h 630 assets/social-card.svg -o assets/social-card.png

      - name: Render favicon and home screen icons
        run: |
          rsvg-convert -w 192 -h 192 assets/app-icon.svg -o assets/app-icon-192.png
          rsvg-convert -w 512 -h 512 assets/app-icon.svg -o assets/app-icon-512.png
          rsvg-convert -w 180 -h 180 assets/app-icon.svg -o assets/apple-touch-icon.png

      - name: Normalize site icon and manifest metadata
        run: node scripts/normalize-site-icons.mjs

      - name: Normalize service worker registration and offline page
        run: node scripts/normalize-offline.mjs

      - name: Normalize mobile reader controls across story pages
        run: node scripts/normalize-reader-tools.mjs

      - name: Normalize public asset references
        run: node scripts/normalize-public-assets.mjs

      - name: Normalize reading-time metadata and length categories
        run: node scripts/normalize-reading-times.mjs

      - name: Normalize story page navigation loaders
        run: node scripts/normalize-story-navigation.mjs

      - name: Normalize editorial fear levels
        run: node scripts/normalize-fear-levels.mjs

      - name: Normalize HTML anchors and accessibility
        run: node scripts/normalize-html-basics.mjs

      - name: Extract completely shared story CSS
        run: node scripts/normalize-shared-story-css.mjs

      - name: Generate story tags aftertaste and related links
        run: node scripts/normalize-related-stories.mjs

      - name: Generate unified story overview panels
        run: node scripts/normalize-story-overviews.mjs

      - name: Generate search discovery metadata RSS social cards and comparable work cards
        run: node scripts/normalize-discovery.mjs

      - name: Generate dedicated series pages and discovery links
        run: node scripts/normalize-series-pages.mjs

      - name: Audit story metadata and cross-story repetition
        id: content_audit
        continue-on-error: true
        run: node scripts/audit-stories.mjs

      - name: Audit story length categories
        id: length_audit
        continue-on-error: true
        run: node scripts/audit-length-categories.mjs

      - name: Audit story page navigation
        id: navigation_audit
        continue-on-error: true
        run: node scripts/audit-story-navigation.mjs

      - name: Audit fear levels
        id: fear_audit
        continue-on-error: true
        run: node scripts/audit-fear-levels.mjs

      - name: Audit HTML metadata internal links and accessibility
        id: html_audit
        continue-on-error: true
        run: node scripts/audit-html-basics.mjs

      - name: Audit public assets and page weight
        id: assets_audit
        continue-on-error: true
        run: node scripts/audit-public-assets.mjs

      - name: Audit search discovery 404 robots RSS and social sharing
        id: discovery_audit
        continue-on-error: true
        run: node scripts/audit-discovery.mjs

      - name: Audit favicon home screen icons and web app manifest
        id: icons_audit
        continue-on-error: true
        run: node scripts/audit-site-icons.mjs

      - name: Audit service worker cache freshness and offline fallback
        id: offline_audit
        continue-on-error: true
        run: node scripts/audit-offline.mjs

      - name: Audit smartphone reading controls and long-form navigation
        id: reader_audit
        continue-on-error: true
        run: node scripts/audit-reader-experience.mjs

      - name: Audit dedicated series pages and discovery links
        id: series_audit
        continue-on-error: true
        run: node scripts/audit-series-pages.mjs

      - name: Audit story tags aftertaste and related links
        id: related_audit
        continue-on-error: true
        run: node scripts/audit-related-stories.mjs

      - name: Audit unified story overview panels
        id: overview_audit
        continue-on-error: true
        run: node scripts/audit-story-overviews.mjs

      - name: Audit comparable homepage story cards
        id: cards_audit
        continue-on-error: true
        run: node scripts/audit-work-cards.mjs

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-audit-reports
          path: reports/*.md
          if-no-files-found: error

      - name: Commit normalized metadata and audit reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .nojekyll index.html 404.html offline.html service-worker.js robots.txt feed.xml manifest.webmanifest assets stories series data sitemap.xml reports/*.md
          if git diff --cached --quiet; then
            echo "Content metadata and audit reports are unchanged."
          else
            git commit -m "chore: normalize public pages and update audit reports"
            git pull --rebase origin main
            git push
          fi

      - name: Fail when audit errors exist
        if: steps.content_audit.outcome == 'failure' || steps.length_audit.outcome == 'failure' || steps.navigation_audit.outcome == 'failure' || steps.fear_audit.outcome == 'failure' || steps.html_audit.outcome == 'failure' || steps.assets_audit.outcome == 'failure' || steps.discovery_audit.outcome == 'failure' || steps.icons_audit.outcome == 'failure' || steps.offline_audit.outcome == 'failure' || steps.reader_audit.outcome == 'failure' || steps.series_audit.outcome == 'failure' || steps.related_audit.outcome == 'failure' || steps.overview_audit.outcome == 'failure' || steps.cards_audit.outcome == 'failure'
        run: exit 1
