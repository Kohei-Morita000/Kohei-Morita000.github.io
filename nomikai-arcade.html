          <g class="lg3"><path d="M74 42 C76 50 78 54 82 59 L85 66" stroke="${coat}" stroke-width="5.5" fill="none" stroke-linecap="round"/><rect x="81" y="64" width="7" height="4.5" rx="1.4" fill="${shade}"/></g>
        </g>
      </svg>`;
    };
    const intro = () => {
      frame(this.name, `
        <div class="rules">
          <div class="rl"><span class="ri">${IC.horse(16)}</span><span>順番に<b>愛馬を1頭指名</b>。プレイヤーの馬だけのガチンコ勝負。</span></div>
          <div class="rl"><span class="ri">${IC.eye(16)}</span><span>脚質とオッズは<b>選んだあとのパドックで公開</b>。指名は勘だ!</span></div>
          <div class="rl"><span class="ri">${IC.target(16)}</span><span>接戦になったら<b>ゴール写真による写真判定</b>で決着!</span></div>
          <div class="rl"><span class="ri">${IC.beer(16)}</span><span><b>優勝オーナー以外は全員一口</b>。勝てば無傷、1着争いがすべて!</span></div>
        </div>
        <button class="big-btn gold" id="go">出馬表を見る</button>`);
      $('#go').onclick = () => { SFX.tap(); pickTurn(0); };
    };
    const pickTurn = pi => {
      if(pi >= P.length){ paddock(); return; }
      frame(this.name, `
        ${turnBadge(P[pi], 'さん、愛馬を指名!')}
        ${horses.map((h,i)=>`
          <button class="horse-card ${h.owner>=0?'taken':''}" data-i="${i}">
            <span class="hc-sw" style="background:${h.coat}">${IC.horse(22)}</span>
            <span>${esc(h.nm)}${h.owner>=0?`<small>${esc(P[h.owner])} が指名済み</small>`:'<small>???</small>'}</span>
          </button>`).join('')}`);
      $$('.horse-card').forEach(b => b.onclick = () => {
        SFX.ok(); buzz(20);
        horses[+b.dataset.i].owner = pi;
        pickTurn(pi + 1);
      });
    };
    const paddock = () => {
      SFX.fanfare();
      frame(this.name, `
        <div class="center-txt disp" style="font-size:20px;margin:4px 0 12px">パドック — 出走馬紹介</div>
        ${horses.map(h=>`
          <div class="horse-card" style="pointer-events:none">
            <span class="hc-sw" style="background:${h.coat}">${IC.horse(22)}</span>
            <span>${esc(h.nm)}<small>${AVATARS[h.owner]} ${esc(P[h.owner])} / 脚質:${h.style.key}</small></span>
            <span class="odds">${h.odds}倍</span>
          </div>`).join('')}
        <button class="big-btn" id="go">ファンファーレ → レーススタート!</button>`);
      $('#go').onclick = () => { SFX.tap(); race(); };
    };
    const race = () => {
      horses.forEach((h,i) => { h.pos = 0; h.noise = 1; h.fin = 0; h.ft = 0; h.lane = i; });
      frame(this.name, `
        <div class="commentary" id="cm">間もなく発走──ファンファーレ!</div>
        <div class="race-track" id="tk">
          <div class="rail" id="rail"></div>
          <div class="dist-badge" id="dist2">1600m</div>
          <div class="goalline"></div>
          ${horses.map((h,i)=>`
            <div class="lane">
              <span class="ltag">${esc(P[h.owner])}|${esc(h.nm)}</span>
              <div class="rhorse" id="h${i}">${horseSVG(h)}</div>
            </div>`).join('')}
        </div>`);
      const cm = $('#cm');
      const RACE_MS = 13000;
      let last = 0, raf = null, done = 0, order = [], leader = -1, cmLock = 0, mile = 0, hoofT = 0, dustT = 0, snap = null;
      const say = (txt, force) => { const now = performance.now(); if(force || now - cmLock > 1600){ cmLock = now; cm.textContent = txt; } };
      // --- 発走前シークエンス:ファンファーレ → ゲートイン → ゲート開放 ---
      const fdur = SFX.raceFanfare();
      BGM.duck(fdur + 1200);
      later(() => say('各馬、ゲートイン……', true), fdur - 700);
      later(() => {
        SFX.noise({dur:.12, vol:.1, filter:2600});   // ゲート開放のガシャン
        buzz(50); flash('rgba(255,255,255,.35)');
        const tk = document.getElementById('tk');
        if(tk) tk.classList.add('racing');
        say('スタートしました!各馬一斉に飛び出す!', true);
        last = 0;
        raf = requestAnimationFrame(step);
      }, fdur + 400);
      const step = ts => {
        const tk = document.getElementById('tk');
        if(!tk){ if(raf) cancelAnimationFrame(raf); return; }
        if(!last) last = ts;
        const dt = Math.min(60, ts - last); last = ts;
        hoofT += dt; dustT += dt;
        if(hoofT > 130 && done < horses.length){ hoofT = 0; SFX.noise({dur:.04, vol:.03, filter:700}); }
        const W = tk.clientWidth - 116;
        const rect = tk.getBoundingClientRect();
        let lead = -1, leadPos = -1;
        horses.forEach((h, i) => {
          if(h.fin) return;
          const e = h.pos;
          h.noise = Math.min(1.2, Math.max(.82, h.noise + (Math.random() - .5) * .12 * (1 - e * .5)));
          const m = h.style.early + (h.style.late - h.style.early) * (e * e * (3 - 2 * e));
          let v = (dt / RACE_MS) * m * h.noise;
          // 終盤ほど強くなるゴムバンド → 1着争いが大接戦に
          const band = .05 + e * .16;
          v *= 1 + Math.max(0, (leadPos > 0 ? leadPos : 0) - h.pos) * band;
          h.pos += v;
          if(h.pos >= 1){
            h.pos = 1; h.fin = ++done; h.ft = performance.now(); order.push(i);
            if(done === 1){ SFX.go(); flash('rgba(255,255,255,.3)'); snap = horses.map(x => x.pos); }
          }
          const el = document.getElementById('h' + i);
          if(el){
            el.style.transform = 'translateX(' + (h.pos * W) + 'px)';
            if(mile >= 2 && !h.fin) el.classList.add('spurt'); else el.classList.remove('spurt');
          }
          if(h.pos > leadPos){ leadPos = h.pos; lead = i; }
        });
        // 地面と柵のスクロール(疾走感)
        tk.style.backgroundPosition = (-Math.round(leadPos * 2600)) + 'px 0px, 0px 0px';
        const rail = document.getElementById('rail');
        if(rail) rail.style.backgroundPosition = (-Math.round(leadPos * 3400)) + 'px 0px, 0px 0px';
        // 残り距離
        const d2 = document.getElementById('dist2');
        if(d2) d2.textContent = done ? 'GOAL!' : '残り ' + Math.max(0, Math.round((1 - leadPos) * 1600 / 50) * 50) + 'm';
        // 最終直線の砂埃
        if(mile >= 2 && dustT > 160){
          dustT = 0;
          horses.forEach((h, i) => {
            if(h.fin) return;
            const el = document.getElementById('h' + i);
            if(el){ const r = el.getBoundingClientRect(); FX.dustAt(r.left + 8, r.bottom - 4, 2); }
          });
        }
        if(lead >= 0 && lead !== leader && done === 0){ leader = lead; say('先頭は ' + horses[lead].nm + '!'); }
        if(mile === 0 && leadPos > .5){ mile = 1; say('中盤の攻防!' + horses[lead].nm + ' がリード!'); }
        if(mile === 1 && leadPos > .75){ mile = 2; SFX.chime(); shake(); say('最終コーナーを回って直線勝負!!', true); }
        if(mile === 2 && leadPos > .88){ mile = 3; say('各馬横一線!ゴールまであとわずか──!!', true); buzz(40); }
        if(done < horses.length){ raf = requestAnimationFrame(step); }
        else {
          const margin = horses[order[1]] ? Math.abs(horses[order[0]].ft - horses[order[1]].ft) : 9999;
          later(() => margin < 260 ? photoSeq(order, margin, snap) : results(order, margin, false, snap), 800);
        }
      };
    };
    /* --- ゴール写真の生成 --- */
    const photoPanel = (snap, order, ringWinner) => {
      const leadPos = Math.max(...snap);
      const lanesHtml = horses.map((h, i) => {
        const gap = Math.min((leadPos - snap[i]) * 2800, 300);   // 差を拡大して見せる
        return `<div class="ph-lane">
          <span class="ph-name">${esc(h.nm)}(${esc(P[h.owner])})</span>
          <div class="ph-horse" style="left:calc(78% - ${Math.round(gap)}px)">${horseSVG(h)}</div>
          ${ringWinner === i ? `<div class="win-ring" style="left:calc(78% - 30px);top:9px"></div>` : ''}
        </div>`;
      }).join('');
      return `<div class="finish-photo">
        <div class="ph-goal"></div>
        ${lanesHtml}
        <span class="ph-cap">NOMIDOKORO KEIBA — GOAL LINE PHOTO</span>
      </div>`;
    };
    /* --- 写真判定 --- */
    const photoSeq = (order, margin, snap) => {
      SFX.drum(2.4); buzz(50);
      frame(this.name, `
        <div class="photo-card" style="padding:18px 14px 14px">
          <div class="pt">写 真 判 定</div>
          <div class="ps">${esc(horses[order[0]].nm)} と ${esc(horses[order[1]].nm)}、ゴール前ほぼ同時──!</div>
        </div>
        <div id="ph">${photoPanel(snap, order, -1)}</div>
        <div class="center-txt" style="color:var(--dim);font-weight:900" id="jd2">現像中…</div>`);
      later(() => {
        flash('rgba(255,255,255,.9)'); SFX.chime(); buzz(60);
        const ph = document.getElementById('ph');
        if(ph) ph.innerHTML = photoPanel(snap, order, order[0]);
        const jd = document.getElementById('jd2');
        if(jd) jd.textContent = '1着:' + horses[order[0]].nm + '!!';
        SFX.fanfare();
      }, 2400);
      later(() => results(order, margin, true, snap), 4200);
    };
    const marginName = m => m < 60 ? 'ハナ差' : m < 120 ? 'アタマ差' : m < 200 ? 'クビ差' : m < 600 ? '半馬身差' : '快勝';
    const results = (order, margin, photo, snap) => {
      const winH = horses[order[0]];
      const winner = P[winH.owner];
      const losers = P.filter(n => n !== winner);
      frame(this.name, `
        ${photo ? '<div class="center-txt disp" style="font-size:16px;color:var(--gold);margin-bottom:8px">写真判定の結果──</div>' : ''}
        ${snap ? photoPanel(snap, order, order[0]) : ''}
        <div class="rank-list">
          ${order.map((i,k)=>{
            const h = horses[i];
            return `<div class="row ${k===0?'':'loser'}"><span>${k===0?IC.crown(16):k===1?IC.medal(18,2):k===2?IC.medal(18,3):''} ${esc(h.nm)}</span><span style="font-size:12px">${AVATARS[h.owner]} ${esc(P[h.owner])}</span></div>`;
          }).join('')}
        </div>
        <button class="big-btn gold" onclick="SFX.tap();openGame('race')">もう一レース</button>
        <button class="big-btn ghost" onclick="SFX.tap();goHome()">メニューへ</button>`);
      announceResult({
        body:`優勝 ${esc(winH.nm)}!\nオーナー:${esc(winner)} は無傷\n他のオーナーは仲良く一口`,
        sub:`着差:${marginName(margin)}${photo ? '(写真判定)' : ''} / 単勝 ${winH.odds}倍`,
        losers, stamp:'負', celebrate:true
      });
    };
    intro();
  }
};

/* ---- 23. カウント30 ---- */
GAMES.count30 = {
  name:'カウント30', desc:'交代で数え上げ「30」を言ったら負け。1回で言えるのは3つまで', icon:IC.n30(26), time:'約1分', np:'2〜4人', heat:2,
  start(){
    const P = players();
    frame(this.name, `
      <div class="rules">
        <div class="rl"><span class="ri">${IC.n30(16)}</span><span>1から順に、交代で数字を<b>声に出して</b>数え上げる。</span></div>
        <div class="rl"><span class="ri">${IC.chat(16)}</span><span>1回の番で言えるのは<b>連続する数字を3つまで</b>。いくつ言うかは自由。</span></div>
        <div class="rl"><span class="ri">${IC.bomb(16)}</span><span><b>「30」を言った人が負け</b>で一口。29で回されたら…終わりだ。</span></div>
      </div>
      <button class="big-btn" id="go">先攻をルーレットで決める</button>`);
    $('#go').onclick = () => { SFX.tap(); spin(); };
    /* --- 先攻ルーレット --- */
    const spin = () => {
      frame(this.name, `
        <div class="q-card" style="border-color:var(--gold)"><div class="who" style="color:var(--gold)">先攻は…</div><div class="q" id="q">${IC.dice(34)}</div></div>`);
      const order = shuffle(P);
      let i = 0, d = 70;
      const step = () => {
        SFX.tick();
        $('#q').innerHTML = avatarOf(order[i % order.length]) + ' ' + esc(order[i % order.length]);
        i++; d *= 1.18;
        if(d < 400){ later(step, d); return; }
        const first = order[(i-1) % order.length];
        SFX.go(); buzz(30);
        later(() => play(P.indexOf(first)), 900);
      };
      step();
    };
    /* --- 本体 --- */
    const play = startIdx => {
      let cur = 0, turn = startIdx, lock = false;
      const render = () => {
        const danger = cur >= 26;
        const opts = [1,2,3].map(k => {
          const nums = Array.from({length:k}, (_,j) => cur + 1 + j).filter(n => n <= 30);
          if(nums.length < k) return '';
          const has30 = nums.includes(30);
          return `<button class="big-btn ${has30 ? '' : 'ghost'}" style="${has30 ? 'background:linear-gradient(160deg,#c0392b,#8e2418);border-color:#e8503a' : ''}" data-k="${k}">${nums.join('・')}${has30 ? ' ' : ''}</button>`;
        }).join('');
        frame(this.name, `
          ${turnBadge(P[turn], 'さんの番 — 声に出して数えて')}
          <div class="big-timer" id="num" style="${danger ? 'color:var(--red);text-shadow:0 0 26px rgba(232,80,58,.5)' : ''}">${cur === 0 ? '—' : cur}</div>
          <div class="center-txt" style="color:var(--dim);font-weight:900;margin-bottom:14px">30 まで あと <b style="color:${danger ? 'var(--red)' : 'var(--gold)'}">${30 - cur}</b></div>
          <div id="opts">${opts}</div>`);
        $$('#opts .big-btn').forEach(b => b.onclick = () => {
          if(lock) return; lock = true;
          const k = +b.dataset.k;
          sayNums(k);
        });
      };
      const sayNums = k => {
        const numEl = () => document.getElementById('num');
        for(let j = 1; j <= k; j++){
          later(() => {
            cur++;
            const el = numEl(); if(!el) return;
            el.textContent = cur;
            el.style.transform = 'scale(1.25)';
            later(() => { const e2 = numEl(); if(e2) e2.style.transform = 'scale(1)'; }, 140);
            if(cur >= 30){
              SFX.boom(); shake(); flash('rgba(232,80,58,.6)');
              later(() => announceResult({body:`${esc(P[turn])} が「30」を言った!\nカウントの果てに散る…`, losers:[P[turn]], stamp:'卅'}), 800);
              return;
            }
            if(cur >= 24){ SFX.heart(); buzz(12); } else SFX.tick();
          }, 420 * j);
        }
        later(() => {
          if(cur >= 30) return;
          turn = (turn + 1) % P.length;
          lock = false;
          render();
        }, 420 * k + 380);
      };
      render();
    };
  }
};

/* ---- 10. 告白 or 飲む ---- */
GAMES.truth = {
  name:'告白 or 飲む', desc:'質問に正直に答えるか、逃げて飲むか', icon:IC.beer(26), time:'約3分', np:'2〜4人', heat:3,
  start(){
    const P = players();
    const drinks = P.map(()=>0);
    let turn = 0;
    const self = this;
    const nextQ = () => deckDraw(self, 'truth', TRUTH_Q);
    const intro = () => {
      frame(this.name, `
        <div class="rules">
          <div class="rl"><span class="ri">${IC.cardback(16)}</span><span>順番に質問カードをめくる。</span></div>
          <div class="rl"><span class="ri">${IC.mic(16)}</span><span><b>正直に答える</b>か、<b>逃げて一口飲む</b>かの二択。</span></div>
          <div class="rl"><span class="ri">${IC.crown(16)}</span><span>「終了」を押すと、今夜の<b>逃げ王</b>が発表される。</span></div>
        </div>
        <button class="big-btn pink" id="go">スタート(${esc(P[0])} さんから)</button>`);
      $('#go').onclick = () => { SFX.tap(); ask(); };
    };
    const ask = () => {
      const q = nextQ();
      SFX.whoosh();
      frame(this.name, `
        <div class="drink-tally">${P.map((p,i)=>`<span class="dt-chip">${AVATARS[i]} ${esc(p)} 逃げ<b> ${drinks[i]}</b></span>`).join('')}</div>
        ${turnBadge(P[turn], 'さんへの質問')}
        <div class="q-card deal"><div class="who">Q.</div><div class="q">${esc(q)}</div></div>
        <button class="big-btn gold" id="honest">${IC.mic(18)} 正直に答える</button>
        <button class="big-btn" id="drink">${IC.beer(18)} 逃げて飲む</button>
        <button class="big-btn ghost" id="end" style="margin-top:20px">終了して結果を見る</button>`);
      $('#honest').onclick = () => { SFX.ok(); turn = (turn+1)%P.length; ask(); };
      $('#drink').onclick = () => {
        SFX.gulp(); buzz(30);
        drinks[turn]++;
        tally[P[turn]] = (tally[P[turn]]||0) + 1; saveState();
        flash('rgba(242,179,61,.3)');
        turn = (turn+1)%P.length; ask();
      };
      $('#end').onclick = () => { SFX.tap(); summary(); };
    };
    const summary = () => {
      const max = Math.max(...drinks);
      const kings = P.filter((_,i)=>drinks[i]===max);
      frame(this.name, `
        <div class="rank-list">
          ${P.map((p,i)=>`<div class="row ${drinks[i]===max&&max>0?'loser':''}"><span>${avatarOf(p)} ${esc(p)}</span><span>逃げ ${drinks[i]} 回</span></div>`).join('')}
        </div>
        <button class="big-btn pink" onclick="SFX.tap();openGame('truth')">もう一回</button>
        <button class="big-btn ghost" onclick="SFX.tap();goHome()">メニューへ</button>`);
      if(max > 0){
        announceResult({title:'本日の逃げ王', body:`${kings.map(esc).join(' と ')}\n(${max}回 逃亡)`, stamp:'逃', color:'#f27ba9', sub:'逃げるが勝ち、とは限らない。'});
      } else {
        announceResult({title:'全員完走', body:'誰も逃げなかった!\n全員に拍手!', stamp:'漢', color:'#4ecb71', celebrate:true, sub:'今夜のこの卓、強い。'});
      }
    };
    intro();
  }
};

/* =============== 起動 =============== */
loadState();
FX.init();
renderHome();
</script>
